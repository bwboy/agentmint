services:
  postgres:
    image: pgvector/pgvector:pg16
    ports: ["${POSTGRES_PORT:-5432}:5432"]
    environment:
      POSTGRES_DB: ${DB_NAME:-agentmint}
      POSTGRES_USER: ${DB_USER:-agentmint}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-agentmint_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/migrate.sql:/docker-entrypoint-initdb.d/01-migrate.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-agentmint} -d ${DB_NAME:-agentmint}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["${REDIS_PORT:-6379}:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - miniodata:/data

  backend:
    build: ./backend
    ports: ["${BACKEND_PORT:-8000}:8000"]
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-agentmint}
      DB_USER: ${DB_USER:-agentmint}
      DB_PASSWORD: ${DB_PASSWORD:-agentmint_dev}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-agentmint-dev-secret-change-in-production-64chars}
      SMS_PROVIDER: ${SMS_PROVIDER:-mock}
      FILE_STORE: ${FILE_STORE:-minio}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-http://localhost:9000}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-agentmint-files}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-["http://localhost:3000"]}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    volumes:
      - ./backend:/app

  web:
    build: ./web
    ports: ["${WEB_PORT:-3000}:3000"]
    environment:
      INTERNAL_API_URL: ${INTERNAL_API_URL:-http://backend:8000}
    depends_on:
      - backend
    volumes:
      - ./web:/app
      - /app/node_modules
      - /app/.next

volumes:
  pgdata:
  miniodata:
